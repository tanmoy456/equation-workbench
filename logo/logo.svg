<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6E8BFF"/>
      <stop offset="1" stop-color="#4A66E0"/>
    </linearGradient>
  </defs>
  <!-- rounded square tile -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <!-- subtle top highlight -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="3"/>
  <!-- summation (sigma) mark -->
  <polyline points="352,156 160,156 276,256 160,356 352,356"
            fill="none" stroke="#FFFFFF" stroke-width="42"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
